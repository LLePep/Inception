services:
 mariadb:
  image: ${DOMAIN_NAME}/inception/mariadb:${GIT_VERSION}
  container_name: mariadb
  networks:
   - inception
  build:
   context: requirements/mariadb
   dockerfile: dockerfile
  env_file: .env
  secrets:
   - db_root_password
   - db_password
  restart: on-failure
  volumes:
   - mariadb_data:/var/lib/mysql
  expose:
   - "3306"
 wordpress:
  image: ${DOMAIN_NAME}/inception/wordpress:${GIT_VERSION}
  container_name: wordpress
  networks:
   - inception
  build:
   context: requirements/wordpress
   dockerfile: dockerfile
  restart: on-failure
  env_file: .env
  secrets:
   - wp_password
  depends_on:
   - mariadb
  volumes:
   - wordpress_data:/var/www/html
  expose:
   - "9000"
 nginx:
  image: ${DOMAIN_NAME}/inception/nginx:${GIT_VERSION}
  container_name: nginx
  networks:
   - inception
  volumes:
   - wordpress_data:/var/www/html
  build:
   context: requirements/nginx
   dockerfile: dockerfile
  depends_on:
   - wordpress
  restart: on-failure
  env_file: .env
  ports:
   - "443:443"

volumes:
 wordpress_data:
  driver: 'local'
  driver_opts:
   type: 'none' 
   o: 'bind'	
   device: '/home/lpalabos/data/wordpress'
 mariadb_data:
  driver: 'local'
  driver_opts:
   type: 'none' 
   o: 'bind'	
   device: '/home/lpalabos/data/mariadb'
networks:
  inception:
   driver: bridge

secrets:
  db_root_password:
   file: ./secrets/db_root_password
  db_password:
   file: ./secrets/db_password
  wp_password:
   file: ./secrets/wp_password